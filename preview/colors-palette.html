<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #FAFAF7; font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 20px; }
  .swatches { display: flex; gap: 12px; flex-wrap: wrap; }
  .swatch { display: flex; flex-direction: column; gap: 6px; }
  .swatch-box { width: 80px; height: 56px; }
  .swatch-name { color: #555; font-size: 10px; }
  .swatch-val  { color: #111; font-size: 10px; }
</style>
</head>
<body>
<div class="swatches">
  <div class="swatch">
    <div class="swatch-box" style="background:#FAFAF7;border:1px solid rgba(17,17,17,0.12)"></div>
    <div class="swatch-name">--bg</div>
    <div class="swatch-val">#FAFAF7</div>
  </div>
  <div class="swatch">
    <div class="swatch-box" style="background:#111111"></div>
    <div class="swatch-name">--ink</div>
    <div class="swatch-val">#111111</div>
  </div>
  <div class="swatch">
    <div class="swatch-box" style="background:#555555"></div>
    <div class="swatch-name">--ink-muted</div>
    <div class="swatch-val">#555555</div>
  </div>
  <div class="swatch">
    <div class="swatch-box" style="background:#1B3A5C"></div>
    <div class="swatch-name">--accent</div>
    <div class="swatch-val">#1B3A5C</div>
  </div>
  <div class="swatch">
    <div class="swatch-box" style="background:rgba(17,17,17,0.12);"></div>
    <div class="swatch-name">--divider</div>
    <div class="swatch-val">rgba(17,17,17,.12)</div>
  </div>
  <div class="swatch">
    <div class="swatch-box" style="background:#FAFAF7;background-image:radial-gradient(circle,rgba(17,17,17,0.12) 1px,transparent 1px);background-size:8px 8px;border:1px solid rgba(17,17,17,0.1)"></div>
    <div class="swatch-name">--grid-dot</div>
    <div class="swatch-val">opacity 0.04</div>
  </div>
</div>
</body>
</html>
