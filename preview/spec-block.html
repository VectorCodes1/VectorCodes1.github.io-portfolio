<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #FAFAF7; padding: 24px 28px; }
  dl {
    display: grid;
    grid-template-columns: max-content 1fr;
    gap: 5px 40px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.02em;
    padding: 16px 0;
    border-top: 1px solid rgba(17,17,17,0.12);
    border-bottom: 1px solid rgba(17,17,17,0.12);
  }
  dt { color: #555; font-weight: 400; }
  dd { color: #111; font-weight: 500; }
</style>
</head>
<body>
  <dl>
    <dt>Role</dt><dd>Test Engineering CWEP</dd>
    <dt>Employer</dt><dd>Lockheed Martin</dd>
    <dt>Date</dt><dd>Apr 2024 – Apr 2026</dd>
    <dt>Frequency</dt><dd>2.4 GHz – 18 GHz</dd>
    <dt>Topology</dt><dd>RF Signal Integrity</dd>
    <dt>Tools</dt><dd>SolidWorks, FDM, KiCad, LTSpice</dd>
  </dl>
</body>
</html>
