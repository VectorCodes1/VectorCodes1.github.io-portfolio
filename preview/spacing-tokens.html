<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #FAFAF7; padding: 20px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #555; }
  .grid { display: flex; align-items: flex-end; gap: 10px; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .bar { background: #1B3A5C; width: 16px; opacity: 0.7; }
  .name { font-size: 9px; color: #888; }
</style>
</head>
<body>
<div class="grid">
  <div class="item"><div class="bar" style="height:2px"></div><div class="name">2</div></div>
  <div class="item"><div class="bar" style="height:4px"></div><div class="name">4</div></div>
  <div class="item"><div class="bar" style="height:8px"></div><div class="name">8</div></div>
  <div class="item"><div class="bar" style="height:12px"></div><div class="name">12</div></div>
  <div class="item"><div class="bar" style="height:16px"></div><div class="name">16</div></div>
  <div class="item"><div class="bar" style="height:20px"></div><div class="name">20</div></div>
  <div class="item"><div class="bar" style="height:24px"></div><div class="name">24</div></div>
  <div class="item"><div class="bar" style="height:32px"></div><div class="name">32</div></div>
  <div class="item"><div class="bar" style="height:48px"></div><div class="name">48</div></div>
  <div class="item"><div class="bar" style="height:64px"></div><div class="name">64</div></div>
  <div class="item"><div class="bar" style="height:96px"></div><div class="name">96</div></div>
</div>
<div style="margin-top:16px;font-size:9px;color:#888">All values in px. Base unit: 4px. No border-radius. No shadows.</div>
</body>
</html>
